# 03-3 · accelerate_ddp_multinode.yaml
# NUM_MACHINES / NUM_PROCESSES(=M*N) 값을 환경에 맞게 채우거나 driver가 env로 주입
compute_environment: LOCAL_MACHINE
distributed_type: MULTI_GPU
num_machines: 2
num_processes: 8
machine_rank: 0
main_process_ip: ${MASTER_ADDR}
main_process_port: ${MASTER_PORT}
mixed_precision: bf16
